services:
  db:
    image: postgres:15
    container_name: api-gestao-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: api_gestao
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d api_gestao"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: api-gestao-app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=api_gestao
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
